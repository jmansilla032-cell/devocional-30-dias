<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset 30</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;500;700&family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        :root { 
            --principal: #5e548e; /* Un lila ceniza */
            --destacado: #b07d62; /* Terracota suave */
            --fondo: #f4f1de; /* Arena/Crema neutro, nada de amarillo */
            --hoja: #ffffff; 
            --texto: #3d405b; /* Gris azulado profundo */
            --linea: #e0e0e0;
        }
        
        body { font-family: 'Montserrat', sans-serif; background: var(--fondo); color: var(--texto); margin: 0; padding: 20px; line-height: 1.6; }
        .contenedor { max-width: 480px; margin: auto; }
        
        header { text-align: center; padding: 40px 0 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-style: italic; margin: 0; color: var(--principal); }
        
        .barra-progreso { background: #e9ecef; border-radius: 20px; height: 6px; width: 60%; margin: 15px auto; overflow: hidden; }
        #progreso-llenado { background: var(--destacado); height: 100%; width: 0%; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .tarjeta { 
            background: var(--hoja); 
            padding: 40px 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
            margin-bottom: 30px;
            border: 1px solid rgba(0,0,0,0.02);
        }
        
        h2 { font-size: 1.3rem; font-weight: 700; margin-top: 0; color: var(--principal); letter-spacing: -0.5px; }
        
        .contexto { font-size: 0.85rem; color: #8d99ae; margin-bottom: 25px; border-bottom: 1px solid var(--linea); padding-bottom: 10px; }

        .versiculo { 
            font-size: 1.2rem; font-family: 'Playfair Display', serif; font-style: italic;
            color: var(--texto); display: block; padding: 20px; 
            background: #fdfaf7; margin: 25px 0; 
            border-radius: 8px; border-left: 3px solid var(--destacado);
            cursor: pointer;
        }
        
        label { font-weight: 700; display: block; margin-top: 30px; color: var(--destacado); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; }
        
        textarea { 
            width: 100%; border: none; border-bottom: 1.5px solid var(--linea); 
            background: transparent; padding: 12px 0; margin-top: 5px; 
            box-sizing: border-box; font-family: 'Indie Flower', cursive; 
            font-size: 1.25rem; resize: none; color: #555;
        }
        textarea:focus { outline: none; border-bottom: 1.5px solid var(--principal); }

        .desafio-box { 
            background: #f8f9fa; padding: 20px; border-radius: 12px; 
            margin-top: 35px; border: 1px solid var(--linea);
            font-size: 0.95rem; text-align: left;
        }
        .desafio-tag { color: var(--destacado); font-weight: 700; display: block; margin-bottom: 5px; font-size: 0.8rem; }

        .btn-principal { 
            background: var(--principal); color: white; border: none; 
            padding: 18px; border-radius: 12px; width: 100%; 
            font-weight: 700; margin-top: 25px; cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-principal:active { transform: scale(0.98); }

        .btn-reset {
            background: transparent; border: none; color: #adb5bd;
            font-size: 0.75rem; cursor: pointer; display: block; margin: 30px auto;
        }

        .tracker-container { display: none; text-align: center; }
        .grilla { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; margin: 30px 0; }
        .dia-circulo { 
            width: 40px; height: 40px; border: 1.5px solid var(--linea); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem;
        }
        .dia-circulo.cumplido { background: var(--destacado); color: white; border-color: var(--destacado); }
    </style>
</head>
<body>

<div class="contenedor">
    <header>
        <h1>Reset de 30 días</h1>
        <div class="barra-progreso"><div id="progreso-llenado"></div></div>
    </header>

    <div class="tarjeta" id="card-principal">
        <h2 id="subtitulo"></h2>
        <div id="box-contexto" class="contexto"></div>

        <label>Lectura del día</label>
        <span class="versiculo" id="cita" onclick="toggleMemoria()"></span>
        
        <p id="reflexion" style="font-size: 1rem; color: #4a4e69;"></p>

        <label>¿Qué pensás de esto?</label>
        <textarea rows="3" id="input-reflexion" placeholder="Escribí acá tus pensamientos..."></textarea>

        <label>Propósito de hoy</label>
        <textarea rows="2" id="input-accion" placeholder="¿Cómo lo vas a aplicar?"></textarea>

        <div class="desafio-box">
            <span class="desafio-tag">EL DESAFÍO</span>
            <div id="desafio"></div>
        </div>

        <button class="btn-principal" onclick="siguienteDia()">Finalizar día</button>
        <button class="btn-reset" onclick="reiniciarTodo()">Reiniciar progreso</button>
    </div>

    <div class="tarjeta tracker-container" id="tracker-semanal">
        <h2>Pausa Semanal</h2>
        <p style="font-size: 0.9rem; color: #777;">Marcá los días que pudiste completar tu reset:</p>
        <div class="grilla" id="grilla-habitos"></div>
        <button class="btn-principal" onclick="cerrarTracker()">Empezar siguiente semana</button>
    </div>
</div>

<script>
    const contenidoDevocional = {
        1: {
            subtitulo: "Día 1: Calmar el ruido",
            cita: "Salmos 46:10 - 'Quédense quietos y sepan que yo soy Dios'",
            contexto: "Escrito durante conflictos militares. La quietud no era relajación, era confianza en medio del peligro.",
            reflexion: "En un mundo que te pide correr, frenar es un acto de rebeldía y fe. ¿Qué pasaría si hoy dejas que Dios tome el volante?",
            desafio: "Cociná algo rico y disfrutalo sin pantallas. Saboreá cada bocado.",
        },
        2: {
            subtitulo: "Día 2: Tu diseño original",
            cita: "Salmos 139:14 - 'Soy una creación admirable'",
            contexto: "David escribió esto asombrado por la complejidad de la vida, mucho antes de la genética moderna.",
            reflexion: "No sos un accidente ni un error. Tu personalidad y tus talentos tienen un propósito. Dejá de compararte.",
            desafio: "Mandale un mensaje a alguien que aprecias mucho, solo para decirle por qué es importante para vos.",
        },
        3: {
            subtitulo: "Día 3: Soltar la carga",
            cita: "1 Pedro 5:7 - 'Depositen en él toda su ansiedad'",
            contexto: "Pedro le hablaba a comunidades bajo mucha presión externa. 'Depositar' es transferir la carga a alguien más capaz.",
            reflexion: "No fuiste diseñada para cargar con el peso del futuro. Dios ya está ahí, esperándote.",
            desafio: "Mañana, despertate 10 minutos antes y quedate en silencio, sin mirar el celular.",
        }
    };

    let diaActual = parseInt(localStorage.getItem('diaDevocional')) || 1;
    let versiculoOriginal = "";

    function cargarDia(num) {
        const data = contenidoDevocional[num];
        if (!data) {
            diaActual = 1;
            cargarDia(1);
            return;
        }
        
        document.getElementById('subtitulo').innerText = data.subtitulo;
        versiculoOriginal = data.cita;
        document.getElementById('cita').innerText = data.cita;
        document.getElementById('box-contexto').innerText = data.contexto;
        document.getElementById('reflexion').innerText = data.reflexion;
        document.getElementById('desafio').innerText = data.desafio;
        document.getElementById('progreso-llenado').style.width = (num / 30 * 100) + "%";
        
        document.getElementById('input-reflexion').value = "";
        document.getElementById('input-accion').value = "";
    }

    function toggleMemoria() {
        const citaEl = document.getElementById('cita');
        if (citaEl.innerText === versiculoOriginal) {
            citaEl.innerText = versiculoOriginal.replace(/\b(\w{4,})\b/g, "____");
        } else {
            citaEl.innerText = versiculoOriginal;
        }
    }

    function siguienteDia() {
        if (diaActual % 7 === 0) { mostrarTracker(); } 
        else { avanzar(); }
    }

    function mostrarTracker() {
        document.getElementById('card-principal').style.display = 'none';
        document.getElementById('tracker-semanal').style.display = 'block';
        const grilla = document.getElementById('grilla-habitos');
        grilla.innerHTML = "";
        for(let i=1; i<=7; i++) {
            grilla.innerHTML += `<div class="dia-circulo" onclick="this.classList.toggle('cumplido')">${i}</div>`;
        }
    }

    function cerrarTracker() {
        document.getElementById('tracker-semanal').style.display = 'none';
        document.getElementById('card-principal').style.display = 'block';
        avanzar();
    }

    function avanzar() {
        if (diaActual < 30) {
            diaActual++;
            localStorage.setItem('diaDevocional', diaActual);
            cargarDia(diaActual);
            window.scrollTo(0,0);
        }
    }

    function reiniciarTodo() {
        if(confirm("¿Querés volver al Día 1?")) {
            localStorage.clear();
            location.reload();
        }
    }

    cargarDia(diaActual);
</script>
</body>
</html>
