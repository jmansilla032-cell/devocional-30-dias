<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectados: 30 Días de Reset</title>
    <style>
        :root { --principal: #4a4e69; --destacado: #9a8c98; --fondo: #f2e9e4; --tarjeta: #ffffff; --texto: #22223b; }
        body { font-family: 'Montserrat', sans-serif; background: var(--fondo); color: var(--texto); margin: 0; padding: 15px; }
        .contenedor { max-width: 480px; margin: auto; padding-bottom: 50px; }
        header { text-align: center; padding: 20px 0; }
        .barra-progreso { background: #d8e2dc; border-radius: 20px; height: 10px; width: 100%; margin: 15px 0; overflow: hidden; }
        #progreso-llenado { background: var(--destacado); height: 100%; width: 0%; transition: 0.8s; }
        .tarjeta { background: var(--tarjeta); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .versiculo { font-size: 1.1rem; font-weight: 500; color: var(--destacado); display: block; padding-left: 15px; border-left: 4px solid var(--destacado); margin: 15px 0; }
        label { font-weight: 700; display: block; margin-top: 20px; color: var(--principal); }
        textarea, input { width: 100%; border: 2px solid #eee; border-radius: 12px; padding: 12px; margin-top: 8px; box-sizing: border-box; font-family: inherit; }
        .btn-principal { background: var(--principal); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 700; margin-top: 30px; cursor: pointer; }
        .spotify-wrapper { margin-top: 20px; border-radius: 12px; overflow: hidden; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="contenedor">
    <header>
        <h1 id="titulo-dia">Cargando...</h1>
        <div class="barra-progreso"><div id="progreso-llenado"></div></div>
        <small id="texto-progreso"></small>
    </header>

    <div class="tarjeta">
        <h2 id="subtitulo"></h2>
        <span class="versiculo" id="cita"></span>
        <p id="reflexion"></p>

        <label>✨ 3 cosas que agradezco hoy:</label>
        <textarea rows="2" id="input-gracias"></textarea>

        <label>✅ Desafío del día:</label>
        <p id="desafio" style="background: #f8f9fa; padding: 10px; border-radius: 10px;"></p>

        <label>🎧 Worship recomendado:</label>
        <div id="spotify-container" class="spotify-wrapper"></div>

        <button class="btn-principal" onclick="siguienteDia()">¡Listo por hoy! →</button>
    </div>
</div>

<script>
    const contenidoDevocional = {
        1: {
            titulo: "Día 1: Resetear el Bocho",
            subtitulo: "Bajá un cambio",
            cita: "Salmo 46:10 - 'Quédense quietos y sepan que yo soy Dios'",
            reflexion: "Vivimos a mil. Hoy Dios te dice: 'Pará la pelota. Yo estoy acá'.",
            desafio: "Cero pantallas durante el almuerzo o cena.",
            spotify: "https://open.spotify.com/embed/track/1L8HnL2q6GjY6u6m6q6m6q" 
        },
        2: {
            titulo: "Día 2: Tu Identidad sin Filtros",
            subtitulo: "Sos un 10 para Él",
            cita: "Salmo 139:14 - 'Soy una creación admirable'",
            reflexion: "Dios te conoce sin filtros. No necesitás likes para valer.",
            desafio: "Subí algo a redes que sea cero estético, algo real.",
            spotify: "https://open.spotify.com/embed/track/2L8HnL2q6GjY6u6m6q6m6q"
        },
        3: {
            titulo: "Día 3: Soltar la Mochila",
            subtitulo: "Chau Ansiedad",
            cita: "1 Pedro 5:7 - 'Depositen en él toda su ansiedad'",
            reflexion: "La ansiedad es una mochila pesada. Dios se la banca, dásela a Él.",
            desafio: "Mañana, no agarres el celu apenas te despiertes por 10 min.",
            spotify: "https://open.spotify.com/embed/track/3L8HnL2q6GjY6u6m6q6m6q" 
        },
        4: {
            titulo: "Día 4: ¿Qué onda tus amigos?",
            subtitulo: "Amistad que suma",
            cita: "Proverbios 17:17 - 'El amigo ama en todo momento'",
            reflexion: "¿Estás siendo el amigo que te gustaría tener? Amar es más que un like.",
            desafio: "Hacé una llamada de verdad (no audio) a alguien que extrañes.",
            spotify: "https://open.spotify.com/embed/track/4L8HnL2q6GjY6u6m6q6m6q"
        },
        5: {
            titulo: "Día 5: Tu Cuerpo, Tu Templo",
            subtitulo: "Cuidate un poco",
            cita: "1 Corintios 6:19 - 'Su cuerpo es templo del Espíritu'",
            reflexion: "Cuidar lo que comés y moverte es también un acto de adoración.",
            desafio: "Hacé 15 minutos de alguna actividad física que te guste hoy.",
            spotify: "https://open.spotify.com/embed/track/5L8HnL2q6GjY6u6m6q6m6q"
        },
        6: {
            titulo: "Día 6: Palabras que Construyen",
            subtitulo: "Ojo con lo que decís",
            cita: "Proverbios 18:21 - 'La lengua tiene poder de vida y muerte'",
            reflexion: "Lo que decís de los demás (y de vos) importa. ¿Hoy construiste o rompiste algo?",
            desafio: "No digas ninguna queja ni crítica en todo el día de hoy.",
            spotify: "https://open.spotify.com/embed/track/6L8HnL2q6GjY6u6m6q6m6q"
        },
        7: {
            titulo: "Día 7: El Descanso de Verdad",
            subtitulo: "Un recreo para el alma",
            cita: "Mateo 11:28 - 'Vengan a mí los que están cansados'",
            reflexion: "Descansar no es solo dormir, es desconectar para conectar con Dios.",
            desafio: "Hoy tomate 20 minutos para estar en silencio total, sin hacer nada.",
            spotify: "https://open.spotify.com/embed/track/7L8HnL2q6GjY6u6m6q6m6q"
        }
    };

    let diaActual = parseInt(localStorage.getItem('diaDevocional')) || 1;

    function cargarDia(num) {
        const data = contenidoDevocional[num];
        if (!data) {
            alert("¡Llegaste al final de lo cargado! Pronto habrá más días.");
            return;
        }
        document.getElementById('titulo-dia').innerText = data.titulo;
        document.getElementById('subtitulo').innerText = data.subtitulo;
        document.getElementById('cita').innerText = data.cita;
        document.getElementById('reflexion').innerText = data.reflexion;
        document.getElementById('desafio').innerText = data.desafio;
        document.getElementById('texto-progreso').innerText = `Día ${num} de 30`;
        document.getElementById('progreso-llenado').style.width = (num / 30 * 100) + "%";
        document.getElementById('spotify-container').innerHTML = `<iframe style="border-radius:12px" src="${data.spotify}" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
        
        document.getElementById('input-gracias').value = "";
    }

    function siguienteDia() {
        if (diaActual < 7) { // Cambié a 7 porque son los días que tenemos cargados ahora
            diaActual++;
            localStorage.setItem('diaDevocional', diaActual);
            cargarDia(diaActual);
            window.scrollTo(0,0);
        } else {
            alert("¡Completaste la primera semana! Sos una genia. Mañana cargamos más.");
        }
    }

    cargarDia(diaActual);
</script>

</body>
</html>
