<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset 30: Tu espacio</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@400;700&family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        :root { 
            --principal: #6d597a; /* Un violeta más cálido */
            --destacado: #b56576; /* Rosa viejo */
            --fondo: #fcf6bd; /* Amarillo crema muy suave */
            --hoja: #fffcf2; 
            --texto: #355070;
        }
        
        body { font-family: 'Montserrat', sans-serif; background: var(--fondo); color: var(--texto); margin: 0; padding: 15px; }
        
        .contenedor { max-width: 450px; margin: auto; }
        
        header { text-align: center; padding: 30px 0 10px; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin: 0; color: var(--principal); }
        
        .barra-progreso { background: #eeebe3; border-radius: 10px; height: 8px; width: 80%; margin: 10px auto; overflow: hidden; }
        #progreso-llenado { background: var(--destacado); height: 100%; width: 0%; transition: 1s ease-in-out; }

        .tarjeta { 
            background: var(--hoja); 
            padding: 30px; 
            border-radius: 2px; /* Menos redondeado para parecer hoja de papel */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px;
            position: relative;
            border-left: 20px solid #e9edc9; /* Efecto margen de cuaderno */
        }
        
        /* Decoración de "anillos" de cuaderno */
        .tarjeta::before {
            content: "• • • • • • •";
            position: absolute;
            left: -15px;
            top: 20px;
            color: #ccc;
            font-size: 20px;
            writing-mode: vertical-rl;
        }

        h2 { font-family: 'Indie Flower', crossorigin; font-size: 1.8rem; margin-top: 0; color: var(--destacado); }
        
        .contexto { font-size: 0.85rem; color: #777; font-style: italic; margin-bottom: 20px; }

        .versiculo { 
            font-size: 1.2rem; 
            font-family: 'Indie Flower', cursive; 
            color: var(--texto); 
            display: block; 
            padding: 15px; 
            background: rgba(212, 163, 115, 0.1);
            margin: 15px 0; 
            border-radius: 5px;
            line-height: 1.4;
            cursor: pointer;
        }
        
        label { font-weight: 700; display: block; margin-top: 25px; color: var(--principal); font-size: 0.8rem; text-transform: uppercase; }
        
        textarea { 
            width: 100%; 
            border: none; 
            border-bottom: 1px solid #d4a373; /* Solo línea abajo para parecer renglón */
            background: transparent;
            padding: 10px 5px; 
            margin-top: 5px; 
            box-sizing: border-box; 
            font-family: 'Indie Flower', cursive; /* Letra manuscrita cuando escribís */
            font-size: 1.2rem; 
            resize: none; 
        }
        textarea:focus { outline: none; border-bottom: 2px solid var(--destacado); }

        .desafio-box { 
            background: #e9edc9; 
            padding: 15px; 
            border-radius: 10px; 
            margin-top: 25px; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .btn-principal { 
            background: var(--principal); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 50px; 
            width: 100%; 
            font-weight: 700; 
            margin-top: 30px; 
            cursor: pointer; 
            font-family: 'Montserrat', sans-serif;
        }

        /* Estilo para el tracker al final */
        .tracker-container { display: none; text-align: center; }
        .grilla { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin: 20px 0; }
        .dia-circulo { 
            width: 35px; height: 35px; border: 1px solid var(--destacado); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
        }
        .dia-circulo.cumplido { background: var(--destacado); color: white; }
    </style>
</head>
<body>

<div class="contenedor">
    <header>
        <h1>Mi Reset Diario</h1>
        <div class="barra-progreso"><div id="progreso-llenado"></div></div>
    </header>

    <div class="tarjeta" id="card-principal">
        <h2 id="subtitulo"></h2>
        <div id="box-contexto" class="contexto"></div>

        <label>📖 El verso de hoy (Tap para memorizar)</label>
        <span class="versiculo" id="cita" onclick="toggleMemoria()"></span>
        
        <p id="reflexion" style="font-size: 1rem;"></p>

        <label>💭 ¿Qué te resuena de esto?</label>
        <textarea rows="3" id="input-reflexion" placeholder="Escribí acá..."></textarea>

        <textarea rows="2" id="input
