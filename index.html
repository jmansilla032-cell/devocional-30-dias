<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Reset Diario</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@400;700&family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        :root { 
            --principal: #6d597a; 
            --destacado: #b56576; 
            --fondo: #fcf6bd; 
            --hoja: #fffcf2; 
            --texto: #355070;
        }
        
        body { font-family: 'Montserrat', sans-serif; background: var(--fondo); color: var(--texto); margin: 0; padding: 15px; }
        .contenedor { max-width: 450px; margin: auto; }
        
        header { text-align: center; padding: 20px 0; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin: 0; color: var(--principal); }
        
        .barra-progreso { background: #eeebe3; border-radius: 10px; height: 8px; width: 80%; margin: 10px auto; overflow: hidden; }
        #progreso-llenado { background: var(--destacado); height: 100%; width: 0%; transition: 1s; }

        .tarjeta { 
            background: var(--hoja); 
            padding: 30px; 
            border-radius: 2px; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px;
            position: relative;
            border-left: 20px solid #e9edc9; 
        }
        
        .tarjeta::before {
            content: "• • • • • • •";
            position: absolute; left: -15px; top: 20px;
            color: #ccc; font-size: 20px; writing-mode: vertical-rl;
        }

        h2 { font-family: 'Indie Flower', cursive; font-size: 1.8rem; margin-top: 0; color: var(--destacado); }
        .contexto { font-size: 0.85rem; color: #777; font-style: italic; margin-bottom: 20px; }

        .versiculo { 
            font-size: 1.2rem; font-family: 'Indie Flower', cursive; 
            color: var(--texto); display: block; padding: 15px; 
            background: rgba(212, 163, 115, 0.1); margin: 15px 0; 
            border-radius: 5px; line-height: 1.4; cursor: pointer;
        }
        
        label { font-weight: 700; display: block; margin-top: 25px; color: var(--principal); font-size: 0.8rem; text-transform: uppercase; }
        
        textarea { 
            width: 100%; border: none; border-bottom: 1px solid #d4a373; 
            background: transparent; padding: 10px 5px; margin-top: 5px; 
            box-sizing: border-box; font-family: 'Indie Flower', cursive; 
            font-size: 1.3rem; resize: none; 
        }
        textarea:focus { outline: none; border-bottom: 2px solid var(--destacado); }

        .desafio-box { 
            background: #e9edc9; padding: 15px; border-radius: 10px; 
            margin-top: 25px; font-weight: 700; font-size: 0.9rem; text-align: center;
        }
        
        .btn-principal { 
            background: var(--principal); color: white; border: none; 
            padding: 15px; border-radius: 50px; width: 100%; 
            font-weight: 700; margin-top: 20px; cursor: pointer; 
        }

        .btn-reset {
            background: transparent; border: none; color: #777;
            font-size: 0.7rem; text-decoration: underline; cursor: pointer;
            display: block; margin: 20px auto;
        }

        .tracker-container { display: none; text-align: center; }
        .grilla { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin: 20px 0; }
        .dia-circulo { 
            width: 35px; height: 35px; border: 1px solid var(--destacado); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
        }
        .dia-circulo.cumplido { background: var(--destacado); color: white; }
    </style>
</head>
<body>

<div class="contenedor">
    <header>
        <h1>Mi Reset Diario</h1>
        <div class="barra-progreso"><div id="progreso-llenado"></div></div>
    </header>

    <div class="tarjeta" id="card-principal">
        <h2 id="subtitulo"></h2>
        <div id="box-contexto" class="contexto"></div>

        <label>📖 El verso de hoy (Tap para memorizar)</label>
        <span class="versiculo" id="cita" onclick="toggleMemoria()"></span>
        
        <p id="reflexion" style="font-size: 1rem; line-height: 1.5;"></p>

        <label>💭 ¿Qué te resuena de esto?</label>
        <textarea rows="3" id="input-reflexion" placeholder="Escribí acá..."></textarea>

        <label>🎯 ¿Cómo lo bajamos a tierra hoy?</label>
        <textarea rows="2" id="input-accion" placeholder="Una acción concreta..."></textarea>

        <div class="desafio-box" id="desafio"></div>

        <button class="btn-principal" onclick="siguienteDia()">Guardar momento</button>
        <button class="btn-reset" onclick="reiniciarTodo()">Reiniciar desde el Día 1</button>
    </div>

    <div class="tarjeta tracker-container" id="tracker-semanal">
        <h2>Balance de la semana</h2>
        <div class="grilla" id="grilla-habitos"></div>
        <button class="btn-principal" onclick="cerrarTracker()">Nueva semana</button>
    </div>
</div>

<script>
    const contenidoDevocional = {
        1: {
            subtitulo: "Día 1: Bajá un cambio",
            cita: "Salmos 46:10 - 'Quédense quietos y sepan que yo soy Dios'",
            contexto: "Escrito en medio de guerras reales. La quietud no era relax, era confianza radical.",
            reflexion: "Frenar no es perder el tiempo, es recuperar la perspectiva. ¿Te animás a soltar el timón hoy?",
            desafio: "Hoy cociná algo rico y compartilo sin sacar fotos. Viví el momento.",
        },
        2: {
            subtitulo: "Día 2: Hecho a mano",
            cita: "Salmos 139:14 - 'Te alabo porque soy una creación admirable'",
            contexto: "David se maravillaba de la vida antes de que existiera la ciencia moderna.",
            reflexion: "Sos una obra maestra, no un producto en serie. Dios no se equivoca con tu personalidad.",
            desafio: "Mandale un audio a alguien que no hablas hace mil. Decile algo copado.",
        },
        3: {
            subtitulo: "Día 3: Soltar la mochila",
            cita: "1 Pedro 5:7 - 'Depositen en él toda su ansiedad'",
            contexto: "Pedro le hablaba a gente perseguida. 'Depositar' significa revolearle la carga a alguien más fuerte.",
            reflexion: "La ansiedad quiere que vivas en un futuro que no existe. Dios está acá, hoy, con vos.",
            desafio: "Mañana, despertate y estate 10 minutos sin tocar el celu. Solo respirá.",
        }
    };

    let diaActual = parseInt(localStorage.getItem('diaDevocional')) || 1;
    let versiculoOriginal = "";

    function cargarDia(num) {
        const data = contenidoDevocional[num];
        if (!data) {
            // Si no hay datos, volvemos al día 1 para no dejar la pantalla vacía
            diaActual = 1;
            cargarDia(1);
            return;
        }
        
        document.getElementById('subtitulo').innerText = data.subtitulo;
        versiculoOriginal = data.cita;
        document.getElementById('cita').innerText = data.cita;
        document.getElementById('box-contexto').innerText = "📜 " + data.contexto;
        document.getElementById('reflexion').innerText = data.reflexion;
        document.getElementById('desafio').innerText = "💡 " + data.desafio;
        document.getElementById('progreso-llenado').style.width = (num / 30 * 100) + "%";
        
        document.getElementById('input-reflexion').value = "";
        document.getElementById('input-accion').value = "";
    }

    function toggleMemoria() {
        const citaEl = document.getElementById('cita');
        if (citaEl.innerText === versiculoOriginal) {
            citaEl.innerText = versiculoOriginal.replace(/\b(\w{4,})\b/g, "____");
        } else {
            citaEl.innerText = versiculoOriginal;
        }
    }

    function siguienteDia() {
        if (diaActual % 7 === 0) { mostrarTracker(); } 
        else { avanzar(); }
    }

    function mostrarTracker() {
        document.getElementById('card-principal').style.display = 'none';
        document.getElementById('tracker-semanal').style.display = 'block';
        const grilla = document.getElementById('grilla-habitos');
        grilla.innerHTML = "";
        for(let i=1; i<=7; i++) {
            grilla.innerHTML += `<div class="dia-circulo" onclick="this.classList.toggle('cumplido')">${i}</div>`;
        }
    }

    function cerrarTracker() {
        document.getElementById('tracker-semanal').style.display = 'none';
        document.getElementById('card-principal').style.display = 'block';
        avanzar();
    }

    function avanzar() {
        if (diaActual < 30) {
            diaActual++;
            localStorage.setItem('diaDevocional', diaActual);
            cargarDia(diaActual);
            window.scrollTo(0,0);
        }
    }

    function reiniciarTodo() {
        if(confirm("¿Querés borrar tu progreso y volver al Día 1?")) {
            localStorage.clear();
            location.reload();
        }
    }

    cargarDia(diaActual);
</script>
</body>
</html>
