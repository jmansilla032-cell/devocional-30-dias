<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset 30: Tu Devocional Interactivo</title>
    <style>
        :root { --principal: #4a4e69; --destacado: #9a8c98; --fondo: #f2e9e4; --tarjeta: #ffffff; --texto: #22223b; --check: #8e947a; }
        body { font-family: 'Montserrat', sans-serif; background: var(--fondo); color: var(--texto); margin: 0; padding: 15px; }
        .contenedor { max-width: 480px; margin: auto; padding-bottom: 50px; }
        header { text-align: center; padding: 20px 0; }
        .barra-progreso { background: #d8e2dc; border-radius: 20px; height: 10px; width: 100%; margin: 15px 0; overflow: hidden; }
        #progreso-llenado { background: var(--destacado); height: 100%; width: 0%; transition: 0.8s; }
        .tarjeta { background: var(--tarjeta); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .versiculo { font-size: 1.1rem; font-weight: 500; color: var(--destacado); display: block; padding: 15px; border-left: 4px solid var(--destacado); background: #faf9f6; margin: 15px 0; cursor: pointer; }
        .contexto { font-size: 0.85rem; color: #666; background: #f0efeb; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        label { font-weight: 700; display: block; margin-top: 20px; color: var(--principal); }
        .desafio-box { background: #f8f9fa; border: 2px dashed var(--destacado); padding: 15px; border-radius: 15px; margin-top: 10px; font-weight: 600; }
        .btn-principal { background: var(--principal); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 700; margin-top: 30px; cursor: pointer; }
        .video-wrapper { margin-top: 20px; border-radius: 12px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Estilos del Tracker */
        .tracker-container { display: none; margin-top: 20px; text-align: center; }
        .grilla { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 15px; }
        .dia-circulo { width: 40px; height: 40px; border: 2px solid var(--destacado); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .dia-circulo.cumplido { background: var(--check); color: white; border-color: var(--check); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="contenedor">
    <header>
        <h1 id="titulo-dia">Cargando...</h1>
        <div class="barra-progreso"><div id="progreso-llenado"></div></div>
        <small id="texto-progreso"></small>
    </header>

    <div class="tarjeta" id="card-principal">
        <h2 id="subtitulo"></h2>
        
        <label>📖 Versículo (Tocá para memorizar):</label>
        <span class="versiculo" id="cita" onclick="toggleMemoria()"></span>
        
        <div id="box-contexto" class="contexto"></div>

        <label>💡 Reflexión:</label>
        <p id="reflexion"></p>

        <label>🚀 Desafío Fuera de la Caja:</label>
        <div class="desafio-box" id="desafio"></div>

        <label>🎥 Worship para hoy:</label>
        <div id="video-container" class="video-wrapper"></div>

        <button class="btn-principal" id="btn-next" onclick="siguienteDia()">¡Listo por hoy! →</button>
    </div>

    <div class="tarjeta tracker-container" id="tracker-semanal">
        <h2>📊 Habit Tracker: Semana 1</h2>
        <p>¿Cómo venís con el reset? Marcá los días que cumpliste:</p>
        <div class="grilla" id="grilla-habitos">
            </div>
        <button class="btn-principal" onclick="cerrarTracker()">Seguir al próximo día</button>
    </div>
</div>

<script>
    const contenidoDevocional = {
        1: {
            titulo: "Día 1: Resetear el Bocho",
            subtitulo: "Bajá un cambio",
            cita: "Salmos 46:10 - 'Quédense quietos y sepan que yo soy Dios'",
            contexto: "Escrito en un momento de guerra y caos. La 'quietud' no era relax, era confianza radical en medio del lío.",
            reflexion: "Frenar no es perder el tiempo, es recuperar la perspectiva.",
            desafio: "Cociná algo rico hoy (aunque sea un sándwich nivel premium) y compartilo sin sacar fotos.",
            youtube: "https://www.youtube.com/embed/P_Nl4K6fXlA" 
        },
        2: {
            titulo: "Día 2: Identidad Real",
            subtitulo: "Sin filtros",
            cita: "Salmos 139:14 - 'Te alabo porque soy una creación admirable'",
            contexto: "David escribe esto maravillado por cómo Dios diseñó cada detalle del cuerpo humano mucho antes de la medicina moderna.",
            reflexion: "Dios no hace cosas 'más o menos'. Sos Su mejor obra.",
            desafio: "Mandale un audio a alguien con quien no hablás hace mil. Solo para saber cómo está.",
            youtube: "https://www.youtube.com/embed/u_K9X8oXz74"
        },
        // ... (Podés seguir completando los días 3 al 6 con el mismo formato)
        7: {
            titulo: "Día 7: El Descanso",
            subtitulo: "Modo Avión",
            cita: "Mateo 11:28 - 'Vengan a mí los que están cansados'",
            contexto: "Jesús le hablaba a gente agobiada por reglas religiosas imposibles de cumplir. Él ofrecía alivio real.",
            reflexion: "El descanso es un comando, no una sugerencia.",
            desafio: "Salí a caminar 15 min sin auriculares. Escuchá el barrio.",
            youtube: "https://www.youtube.com/embed/AswYQidp_nI"
        }
    };

    let diaActual = parseInt(localStorage.getItem('diaDevocional')) || 1;
    let versiculoOriginal = "";

    function cargarDia(num) {
        const data = contenidoDevocional[num];
        if (!data) { return; }
        
        document.getElementById('titulo-dia').innerText = data.titulo;
        document.getElementById('subtitulo').innerText = data.subtitulo;
        versiculoOriginal = data.cita;
        document.getElementById('cita').innerText = data.cita;
        document.getElementById('box-contexto').innerText = "📜 Contexto: " + data.contexto;
        document.getElementById('reflexion').innerText = data.reflexion;
        document.getElementById('desafio').innerText = "🔥 " + data.desafio;
        document.getElementById('texto-progreso').innerText = `Día ${num} de 30`;
        document.getElementById('progreso-llenado').style.width = (num / 30 * 100) + "%";
        document.getElementById('video-container').innerHTML = `<iframe src="${data.youtube}" frameborder="0" allowfullscreen></iframe>`;
    }

    function toggleMemoria() {
        const citaEl = document.getElementById('cita');
        if (citaEl.innerText === versiculoOriginal) {
            // Oculta palabras al azar
            citaEl.innerText = versiculoOriginal.replace(/\b(\w{4,})\b/g, "____");
        } else {
            citaEl.innerText = versiculoOriginal;
        }
    }

    function siguienteDia() {
        if (diaActual % 7 === 0) {
            mostrarTracker();
        } else {
            avanzar();
        }
    }

    function mostrarTracker() {
        document.getElementById('card-principal').style.display = 'none';
        const tracker = document.getElementById('tracker-semanal');
        tracker.style.display = 'block';
        
        const grilla = document.getElementById('grilla-habitos');
        grilla.innerHTML = "";
        for(let i=1; i<=7; i++) {
            grilla.innerHTML += `<div class="dia-circulo" onclick="this.classList.toggle('cumplido')">${i}</div>`;
        }
    }

    function cerrarTracker() {
        document.getElementById('tracker-semanal').style.display = 'none';
        document.getElementById('card-principal').style.display = 'block';
        avanzar();
    }

    function avanzar() {
        if (diaActual < 30) {
            diaActual++;
            localStorage.setItem('diaDevocional', diaActual);
            cargarDia(diaActual);
            window.scrollTo(0,0);
        }
    }

    cargarDia(diaActual);
</script>

</body>
</html>
